openapi: 3.0.3
info:
  title: Hike Club API
  version: 1.0.0
  description: Private API serving hike schedule, trail map, meeting point, and weather for a single scout hiking club.
servers:
  - url: https://hike-club-api.example.workers.dev
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      summary: Liveness check
      security: []
      responses:
        "200":
          description: Service is up
          content:
            text/plain:
              schema:
                type: string
  /hike/{id}:
    get:
      summary: Get a single hike's details, map, and weather
      description: >
        The weather block is versioned via the required `x-api-version` request
        header. Version 1 returns `Weather`; version 2 returns `WeatherV2`
        (start/end temps, precip timing, alerts filtered to the hike window).
        v1 is deprecated (sunset 2026-08-20) — its responses carry RFC 8594
        `Deprecation`/`Sunset` headers; use v2. A missing or unsupported version
        returns 400.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/ApiVersionHeader"
      responses:
        "200":
          description: Hike found
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/HikeResponse"
                  - $ref: "#/components/schemas/HikeResponseV2"
        "400":
          description: Missing hike id, or missing/unsupported API version
        "401":
          description: Missing or invalid API key
        "404":
          description: No hike with that id
        "500":
          description: Internal Server Error
        "502":
          description: Upstream storage error
  /hike-locations:
    get:
      summary: List short-name to full-name mappings for hike locations
      parameters:
        - $ref: "#/components/parameters/ApiVersionHeader"
      responses:
        "200":
          description: Location name mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HikeLocation"
        "400":
          description: Missing or unsupported API version
        "401":
          description: Missing or invalid API key
        "500":
          description: Internal Server Error
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  parameters:
    ApiVersionHeader:
      name: x-api-version
      in: header
      required: true
      description: >
        API version to serve. `1` → v1 (deprecated, sunset 2026-08-20); `2` → v2.
        The header is required; a missing or otherwise unsupported value returns 400.
      schema:
        type: string
        enum: ["1", "2"]
  schemas:
    HikeLocation:
      type: object
      required: [short_name, full_name]
      properties:
        short_name:
          type: string
        full_name:
          type: string
    MeetingPoint:
      type: object
      required: [lat, lon, googleMapsUrl]
      properties:
        lat:
          type: number
        lon:
          type: number
        googleMapsUrl:
          type: string
          format: uri
    MapRef:
      type: object
      required: [url, expiresAt]
      properties:
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
    Precipitation:
      type: object
      deprecated: true
      required: [probabilityPct, amountIn]
      properties:
        probabilityPct:
          type: integer
          minimum: 0
          maximum: 100
        amountIn:
          type: number
          minimum: 0
    Alert:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [precip, nws_alert, heat_index, wind_chill]
        message:
          type: string
    Weather:
      type: object
      deprecated: true
      required: [temperatureF, conditions, precipitation, alerts]
      properties:
        temperatureF:
          type: number
        conditions:
          type: string
        precipitation:
          $ref: "#/components/schemas/Precipitation"
        heatIndexF:
          type: number
          nullable: true
        windChillF:
          type: number
          nullable: true
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
    PrecipitationV2:
      type: object
      required: [probabilityPct, expected]
      properties:
        probabilityPct:
          type: integer
          minimum: 0
          maximum: 100
          description: Max hourly probability during the hike window.
        expected:
          type: boolean
          description: Whether any hour on the hike's local calendar day is at/above the likely threshold.
        startsAt:
          type: string
          format: date-time
          nullable: true
          description: Start of the first likely-precip hour (may precede the hike).
        endsAt:
          type: string
          format: date-time
          nullable: true
          description: End of the last likely-precip hour (may follow the hike).
    WeatherV2:
      type: object
      required: [startTempF, endTempF, conditions, precipitation, alerts]
      properties:
        startTempF:
          type: number
        endTempF:
          type: number
        conditions:
          type: string
        precipitation:
          $ref: "#/components/schemas/PrecipitationV2"
        heatIndexF:
          type: number
          nullable: true
        windChillF:
          type: number
          nullable: true
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
    HikeResponse:
      type: object
      deprecated: true
      required: [id, start, end, meetingPoint, trails, map, weatherAvailable, weather]
      properties:
        id:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        meetingPoint:
          $ref: "#/components/schemas/MeetingPoint"
        trails:
          type: array
          items:
            type: string
        map:
          $ref: "#/components/schemas/MapRef"
        weatherAvailable:
          type: boolean
        weather:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/Weather"
    HikeResponseV2:
      type: object
      required: [id, start, end, meetingPoint, trails, map, weatherAvailable, weather]
      properties:
        id:
          type: string
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        meetingPoint:
          $ref: "#/components/schemas/MeetingPoint"
        trails:
          type: array
          items:
            type: string
        map:
          $ref: "#/components/schemas/MapRef"
        weatherAvailable:
          type: boolean
        weather:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/WeatherV2"
