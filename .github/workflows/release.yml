name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Post-deploy smoke test
        env:
          SMOKE_API_KEY: ${{ secrets.SMOKE_API_KEY }}
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
        run: |
          set -euo pipefail

          health_status=$(curl -s -o /dev/null -w '%{http_code}' "$SMOKE_BASE_URL/health")
          if [ "$health_status" != "200" ]; then
            echo "health check failed: $health_status" >&2
            exit 1
          fi

          hike_status=$(curl -s -o /tmp/smoke_response.json -w '%{http_code}' \
            -H "x-api-key: $SMOKE_API_KEY" \
            "$SMOKE_BASE_URL/hike/smoke-test")
          if [ "$hike_status" != "200" ]; then
            echo "hike smoke test failed: $hike_status" >&2
            cat /tmp/smoke_response.json >&2
            exit 1
          fi

          echo "smoke test passed"

      # Runs last: only tag/publish a GitHub release once the deploy has
      # actually succeeded and passed its smoke test.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install release tooling
        run: npm ci

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
